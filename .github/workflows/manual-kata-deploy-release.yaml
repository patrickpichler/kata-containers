name: Manual kata-deploy release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  REGISTRY_BASE: ghcr.io/${{ github.repository }}

jobs:
  release-amd64:
    name: Build and publish kata-deploy for amd64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/lib/jvm \
            /usr/share/swift \
            /usr/local/share/powershell \
            /usr/local/julia* \
            /opt/az \
            /usr/local/share/chromium \
            /opt/microsoft \
            /opt/google \
            /usr/lib/firefox

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR (docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR (helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build kata-static tarball for amd64
        working-directory: tools/packaging/kata-deploy/local-build
        run: make kata-tarball
        env:
          BUILDER_REGISTRY: ${{ env.REGISTRY_BASE }}/builders

      - name: Publish kata-deploy image and helm chart
        working-directory: tools/packaging/kata-deploy/local-build
        run: make kata-deploy-publish
        env:
          REGISTRY: ${{ env.REGISTRY_BASE }}/kata-deploy
          TAG: ${{ inputs.tag }}
          CHART_REGISTRY: ${{ env.REGISTRY_BASE }}/kata-deploy-charts
          CHART_VERSION: ${{ inputs.tag }}

      - name: Upload kata-static tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: kata-static-amd64-${{ inputs.tag }}
          path: tools/packaging/kata-deploy/local-build/kata-static.tar.zst
          if-no-files-found: error
          retention-days: 30
